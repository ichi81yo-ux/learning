    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.4;

let activeNo = null;

function renderCards() {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  Object.entries(summaries).forEach(([no, cat]) => {
    const n = parseInt(no);
    const div = document.createElement('div');
    div.className = 'card' + (activeNo === n ? ' active' : '');
    div.innerHTML = `
      <div class="card-num">No.${String(n).padStart(2,'0')}</div>
      <div class="card-title">${cat.title}</div>
      <div class="card-sub">${cat.sub}</div>
    `;
    div.onclick = () => toggleDetail(n);
    grid.appendChild(div);
  });
}

function toggleDetail(no) {
  const wrap = document.getElementById('detailWrap');
  if (activeNo === no) {
    closeDetail();
    return;
  }
  activeNo = no;
  const cat = summaries[no];
  document.getElementById('detailTitle').textContent = cat.title;
  document.getElementById('detailNo').textContent = `No.${String(no).padStart(2,'0')}`;
  document.getElementById('detailBody').textContent = cat.content;
  wrap.classList.add('visible');
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  renderCards();
}

function closeDetail() {
  activeNo = null;
  document.getElementById('detailWrap').classList.remove('visible');
  renderCards();
}

renderCards();
</script>
